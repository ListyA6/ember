<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#f6f4f1">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Ember Pact">
<meta name="description" content="Ember Pact — two people, one weight-loss pact. Walk, train, prove it, settle up.">
<title>Ember Pact</title>
<link rel="manifest" href="manifest.webmanifest">
<link rel="icon" href="assets/icon.svg" type="image/svg+xml">
<link rel="apple-touch-icon" href="assets/icon.svg">
<!-- preload the faces used above the fold (wordmark, body, big numerals) -->
<link rel="preload" href="assets/fonts/space-grotesk-latin-600-normal.woff2" as="font" type="font/woff2" crossorigin>
<link rel="preload" href="assets/fonts/space-grotesk-latin-700-normal.woff2" as="font" type="font/woff2" crossorigin>
<link rel="preload" href="assets/fonts/plus-jakarta-sans-latin-500-normal.woff2" as="font" type="font/woff2" crossorigin>
<link rel="stylesheet" href="styles/fonts.css">
<link rel="stylesheet" href="styles/tokens.css">
<link rel="stylesheet" href="styles/base.css">
<link rel="stylesheet" href="styles/components.css">
<link rel="stylesheet" href="styles/animations.css">
</head>
<body>

<!-- animated ember background -->
<div class="bg" aria-hidden="true">
  <div class="blob b1"></div>
  <div class="blob b2"></div>
  <div class="blob b3"></div>
</div>

<div class="app">
  <header class="topbar">
    <button class="brand" onclick="location.hash='/dashboard'" aria-label="Home">
      <span class="mark flicker" aria-hidden="true">
        <svg viewBox="0 0 24 24" width="26" height="26" fill="none">
          <defs><linearGradient id="bm" x1="0" y1="0" x2="1" y2="1">
            <stop offset="0" stop-color="#ff9e2c"/><stop offset="1" stop-color="#ff3d54"/>
          </linearGradient></defs>
          <path d="M12 2.5c1.7 4.2-3 5.4-3 9.5a3 3 0 0 0 6 .4C16 8 12.5 6 12 2.5z" fill="url(#bm)"/>
          <path d="M7 14a5 5 0 0 0 10 0c0-3-2-4-2.6-6 .2 2.6-2 3.2-2 5.2a2.3 2.3 0 0 1-4.5.6C7.2 12.2 7 13 7 14z" fill="url(#bm)" opacity=".55"/>
        </svg>
      </span>
      <span class="name">ember pact</span>
    </button>
    <div class="actions">
      <button class="iconbtn plain" onclick="location.hash='/settings'" aria-label="Settings"
        ><svg class="ic" viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 13.5a7.6 7.6 0 0 0 0-3l1.8-1.4-2-3.4-2.1.9a7.6 7.6 0 0 0-2.6-1.5L14 2h-4l-.5 2.6a7.6 7.6 0 0 0-2.6 1.5l-2.1-.9-2 3.4 1.8 1.4a7.6 7.6 0 0 0 0 3l-1.8 1.4 2 3.4 2.1-.9a7.6 7.6 0 0 0 2.6 1.5L10 22h4l.5-2.6a7.6 7.6 0 0 0 2.6-1.5l2.1.9 2-3.4z"/></svg></button>
    </div>
  </header>

  <main id="view"></main>
</div>

<nav class="navbar" aria-label="Primary">
  <div class="nav" id="nav"></div>
</nav>

<!-- ===== Foundation (order matters: classic scripts) ===== -->
<script src="js/icons.js"></script>
<script src="js/store.js"></script>
<script src="js/pact.js"></script>
<script src="js/pact-sync.js"></script>
<script src="js/ui.js"></script>
<script src="js/charts.js"></script>
<script src="js/router.js"></script>
<script src="js/share.js"></script>
<script src="js/seed.js"></script>

<!-- ===== Views (self-register via App.registerView) ===== -->
<script src="js/views/account.js"></script>
<script src="js/views/dashboard.js"></script>
<script src="js/views/workout.js"></script>
<script src="js/views/walk.js"></script>
<script src="js/views/schedule.js"></script>
<script src="js/views/feed.js"></script>
<script src="js/views/recap.js"></script>
<script src="js/views/stats.js"></script>
<script src="js/views/profile.js"></script>
<script src="js/views/settings.js"></script>

<!-- ===== Boot (LAST) ===== -->
<script src="js/app.js"></script>
</body>
</html>
